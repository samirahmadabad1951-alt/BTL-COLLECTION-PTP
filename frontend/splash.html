<!DOCTYPE html>
<!-- works2/frontend/splash.html -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoStore — Loading...</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #0a3d2a 0%, #1a5c3a 50%, #0a3d2a 100%);
  overflow: hidden;
  font-family: 'Fraunces', Georgia, serif;
}

/* Floating leaves animation */
.leaf {
  position: absolute;
  width: 30px;
  height: 30px;
  background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%234ade80" stroke-width="1.5"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>') no-repeat center;
  background-size: contain;
  opacity: 0;
  animation: floatLeaf 4s ease-in infinite;
  pointer-events: none;
}

@keyframes floatLeaf {
  0% {
    transform: translateY(100vh) rotate(0deg);
    opacity: 0;
  }
  10% {
    opacity: 0.8;
  }
  90% {
    opacity: 0.8;
  }
  100% {
    transform: translateY(-20vh) rotate(360deg);
    opacity: 0;
  }
}

/* Main container */
.splash-container {
  position: relative;
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Animated circle background */
.circle-bg {
  position: absolute;
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(74,222,128,0.3) 0%, rgba(74,222,128,0) 70%);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% {
    transform: scale(1);
    opacity: 0.3;
  }
  50% {
    transform: scale(1.3);
    opacity: 0.1;
  }
}

/* Main content */
.splash-content {
  position: relative;
  text-align: center;
  z-index: 10;
  animation: fadeInUp 1s ease-out;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Logo animation */
.logo-wrapper {
  margin-bottom: 2rem;
  animation: logoSpin 1.5s ease-out;
}

@keyframes logoSpin {
  0% {
    transform: scale(0) rotate(-180deg);
    opacity: 0;
  }
  50% {
    transform: scale(1.1) rotate(0deg);
  }
  100% {
    transform: scale(1) rotate(0deg);
    opacity: 1;
  }
}

.logo-icon {
  width: 120px;
  height: 120px;
  margin: 0 auto;
  background: linear-gradient(135deg, #22c55e 0%, #166534 100%);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3), 0 0 0 4px rgba(74,222,128,0.3);
  animation: glow 2s ease-in-out infinite;
}

@keyframes glow {
  0%, 100% {
    box-shadow: 0 20px 40px rgba(0,0,0,0.3), 0 0 0 4px rgba(74,222,128,0.3);
  }
  50% {
    box-shadow: 0 20px 40px rgba(0,0,0,0.3), 0 0 0 12px rgba(74,222,128,0.5);
  }
}

.logo-icon svg {
  width: 60px;
  height: 60px;
  color: white;
  animation: leafWave 2s ease-in-out infinite;
}

@keyframes leafWave {
  0%, 100% {
    transform: rotate(-10deg);
  }
  50% {
    transform: rotate(10deg);
  }
}

.logo-text {
  margin-top: 1.5rem;
}

.logo-text h1 {
  font-size: 3.5rem;
  color: white;
  letter-spacing: -0.02em;
  text-shadow: 0 2px 10px rgba(0,0,0,0.2);
  animation: slideIn 0.8s ease-out 0.3s both;
}

.logo-text h1 span {
  background: linear-gradient(135deg, #86efac 0%, #22c55e 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  font-style: italic;
}

.tagline {
  margin-top: 1rem;
  color: rgba(255,255,255,0.8);
  font-size: 1.1rem;
  letter-spacing: 2px;
  animation: fadeIn 1s ease-out 0.6s both;
}

/* Loading bar */
.loading-bar-container {
  margin-top: 3rem;
  width: 280px;
  margin-left: auto;
  margin-right: auto;
}

.loading-bar {
  height: 3px;
  background: rgba(255,255,255,0.2);
  border-radius: 3px;
  overflow: hidden;
}

.loading-progress {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, #86efac, #22c55e);
  border-radius: 3px;
  animation: loading 2.5s ease-out forwards;
}

@keyframes loading {
  0% {
    width: 0%;
  }
  20% {
    width: 30%;
  }
  50% {
    width: 65%;
  }
  80% {
    width: 85%;
  }
  100% {
    width: 100%;
  }
}

.loading-text {
  margin-top: 0.75rem;
  color: rgba(255,255,255,0.6);
  font-size: 0.8rem;
  letter-spacing: 1px;
}

/* Eco facts */
.eco-fact {
  position: absolute;
  bottom: 2rem;
  left: 0;
  right: 0;
  text-align: center;
  color: rgba(255,255,255,0.5);
  font-size: 0.8rem;
  animation: fadeIn 1s ease-out 1s both;
}

.eco-fact span {
  color: #86efac;
}

/* Responsive */
@media (max-width: 768px) {
  .logo-icon {
    width: 80px;
    height: 80px;
  }
  .logo-icon svg {
    width: 40px;
    height: 40px;
  }
  .logo-text h1 {
    font-size: 2.5rem;
  }
  .tagline {
    font-size: 0.9rem;
  }
  .loading-bar-container {
    width: 220px;
  }
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateX(-20px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

@keyframes fadeIn {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}

/* Particle effects */
.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #86efac;
  border-radius: 50%;
  opacity: 0;
  animation: particleFloat 3s ease-in infinite;
}

@keyframes particleFloat {
  0% {
    transform: translateY(100vh) scale(0);
    opacity: 0;
  }
  20% {
    opacity: 0.8;
    transform: scale(1);
  }
  80% {
    opacity: 0.8;
  }
  100% {
    transform: translateY(-20vh) scale(0);
    opacity: 0;
  }
}
</style>
</head>
<body>
<div class="splash-container">
  <div class="circle-bg"></div>
  
  <div class="splash-content">
    <div class="logo-wrapper">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"/>
          <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>
        </svg>
      </div>
    </div>
    <div class="logo-text">
      <h1>Eco<span>Store</span></h1>
      <div class="tagline">Shop the future. Plant by plant.</div>
    </div>
    
    <div class="loading-bar-container">
      <div class="loading-bar">
        <div class="loading-progress"></div>
      </div>
      <div class="loading-text">Loading sustainable experience...</div>
    </div>
  </div>
  
  <div class="eco-fact">
    🌱 <span>Did you know?</span> One EcoStore order saves an average of 5kg of CO₂ emissions!
  </div>
</div>

<script>
  // Create floating leaves
  function createLeaf() {
    const leaf = document.createElement('div');
    leaf.className = 'leaf';
    leaf.style.left = Math.random() * 100 + '%';
    leaf.style.width = Math.random() * 20 + 15 + 'px';
    leaf.style.height = leaf.style.width;
    leaf.style.animationDelay = Math.random() * 5 + 's';
    leaf.style.animationDuration = Math.random() * 3 + 3 + 's';
    document.body.appendChild(leaf);
    
    setTimeout(() => {
      leaf.remove();
    }, 8000);
  }
  
  // Create particles
  function createParticle() {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDelay = Math.random() * 5 + 's';
    particle.style.animationDuration = Math.random() * 2 + 2 + 's';
    document.body.appendChild(particle);
    
    setTimeout(() => {
      particle.remove();
    }, 5000);
  }
  
  // Generate random elements
  setInterval(createLeaf, 500);
  setInterval(createParticle, 300);
  
  // Redirect to index.html after loading
  setTimeout(() => {
    window.location.href = 'index.html';
  }, 2800);
</script>
</body>
</html>
